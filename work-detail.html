<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工作经历详情 | Olivia</title>
  <meta name="description" content="Olivia 作品集中的工作经历详情页，按文字在上、图片在下的形式展示。">
  <style>
    :root {
      --bg: #050607;
      --bg-soft: #0b0d10;
      --panel: rgba(255, 255, 255, 0.05);
      --panel-strong: rgba(255, 255, 255, 0.09);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f5f2ea;
      --muted: rgba(245, 242, 234, 0.74);
      --dim: rgba(245, 242, 234, 0.5);
      --accent: #8b5cf6;
      --accent-2: #60a5fa;
      --shadow: 0 36px 110px rgba(0, 0, 0, 0.5);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --max: 1120px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      overflow-x: hidden;
    }

    body::before {
      content: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      margin-bottom: 24px;
    }

    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .back-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .topbar-kicker {
      margin: 0;
      color: var(--dim);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.72rem;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      align-items: start;
    }

    .hero-card,
    .image-card {
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, 0.12), transparent 28%),
        rgba(10, 11, 13, 0.92);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      border-radius: 0;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 11px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 0.8rem;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(1.45rem, 2.6vw, 2.15rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      white-space: nowrap;
      max-width: none;
    }

    .hero-copy {
      max-width: 760px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: clamp(0.94rem, 1.4vw, 1.03rem);
      line-height: 1.72;
    }

    .facts-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .fact-card {
      padding: 16px 16px 18px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
    }

    .fact-card strong {
      display: block;
      margin-bottom: 5px;
      color: var(--text);
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .fact-card span {
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.94rem;
    }

    .image-card {
      margin-top: 0;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      border-radius: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .media-card {
      display: block;
      gap: 0;
      margin: 0;
      padding: 0;
      border-radius: 0;
      border: 0;
      background: transparent;
    }

    .media-card--hero {
      grid-column: auto;
    }

    .media-frame {
      position: relative;
      overflow: visible;
      border-radius: 0;
      background: transparent;
    }

    .media-frame img,
    .media-frame video {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      background: transparent;
    }

    .fallback {
      display: grid;
      place-items: center;
      min-height: 420px;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 820px) {
      .back-link {
        top: 16px;
        left: 16px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .gallery {
        grid-template-columns: 1fr;
      }

      .facts-grid {
        grid-template-columns: 1fr;
      }

      .hero-title {
        max-width: none;
        white-space: normal;
        font-size: clamp(1.7rem, 6vw, 2.6rem);
      }

      .image-frame {
        aspect-ratio: auto;
        min-height: 420px;
      }

      .image-frame img {
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="back-link" href="index.html#work">← 返回作品集</a>
      <p class="topbar-kicker">Work Experience Detail</p>
    </header>

    <section class="detail-grid" aria-label="工作经历详情">
      <article class="hero-card" aria-labelledby="detailTitle">
        <div class="hero-meta">
          <span class="pill" id="detailTag">工作经历</span>
          <span class="pill" id="detailDate">2024.03 – 2026.06</span>
        </div>
        <h1 class="hero-title" id="detailTitle">项目标题</h1>
        <p class="hero-copy" id="detailSummary">项目说明会显示在这里。</p>
        <div class="facts-grid" id="detailFacts"></div>
      </article>

    <section class="image-card" aria-label="项目图片展示">
        <div class="gallery" id="detailGallery"></div>
      </section>
    </section>
  </main>

  <script>
    const projects = [
      {
        title: "CoinW｜高级视觉设计师",
        tag: "2024.03 – 2026.06",
        summary: "负责品牌视觉体系、全球营销活动及产品增长设计，支持品牌升级、产品运营及国际化业务。",
        visual: "linear-gradient(135deg, rgba(139,92,246,.82), rgba(12,14,16,.92) 46%, rgba(96,165,250,.72))",
        gallery: [
          { title: "主视觉", src: "assets/coinw-detail/01-cwtc-main.webp", kind: "image", hero: true },
          { title: "2026", src: "assets/coinw-detail/02-2026.webp", kind: "image" },
          { title: "2027", src: "assets/coinw-detail/03-2027.webp", kind: "image" },
          { title: "2028", src: "assets/coinw-detail/04-2028.webp", kind: "image" },
          { title: "12", src: "assets/coinw-detail/05-12.webp", kind: "image" },
          { title: "13", src: "assets/coinw-detail/06-13.webp", kind: "image" },
          { title: "14", src: "assets/coinw-detail/07-14.webp", kind: "image" },
          { title: "15", src: "assets/coinw-detail/08-15.webp", kind: "image" },
          { title: "16", src: "assets/coinw-detail/09-16.webp", kind: "image" },
          { title: "17", src: "assets/coinw-detail/10-17.webp", kind: "image" },
          { title: "18", src: "assets/coinw-detail/11-18.webp", kind: "image" },
          { title: "19", src: "assets/coinw-detail/12-19.webp", kind: "image" },
          { title: "20", src: "assets/coinw-detail/13-20.webp", kind: "image" },
          { title: "21", src: "assets/coinw-detail/14-21.webp", kind: "image" }
        ],
        facts: [
          ["品牌建设", "品牌视觉体系升级、Logo 应用规范、插画语言及 2D→3D 视觉体系"],
          ["增长营销", "年度账单、世界杯、圣诞交易大赛、LCT Dubai 等 SSS 级项目全链路视觉落地"],
          ["产品视觉", "ETH Pectra、Sui、Mantle Season、W Drops、链上聪明钱等项目视觉表达"],
          ["品牌传播", "Token2049、Consensus、WOW Summit、ONBOARD 等国际峰会品牌视觉设计"],
          ["AI Design", "Figma AI、Vibe Coding、即梦、Midjourney、AIGC 驱动设计工作流"]
        ]
      },
      {
        title: "Tron+火币｜UI / 品牌视觉设计师",
        tag: "2020.10 – 2024.03",
        summary: "负责 NFT、交易平台及品牌营销视觉设计，参与产品从 0 到 1 建设及国际品牌传播。",
        visual: "linear-gradient(135deg, rgba(96,165,250,.9), rgba(10,12,14,.92) 52%, rgba(139,92,246,.66))",
        gallery: [
          { title: "详情图 1", src: "assets/tron-detail/01-ui-visual-design-1.webp", kind: "image", hero: true },
          { title: "详情图 2", src: "assets/tron-detail/02-ui-visual-design-2.webp", kind: "image" },
          { title: "详情图 3", src: "assets/tron-detail/03-2030.webp", kind: "image" },
          { title: "详情图 4", src: "assets/tron-detail/04-ui-visual-design-5.webp", kind: "image" }
        ],
        facts: [
          ["产品设计", "参与 APENFT 交易平台从 0→1 建设，负责产品 UI 设计及整体视觉升级"],
          ["品牌营销", "数字十二生肖 NFT、创世 NFT、黑客松等重点项目视觉设计"],
          ["品牌传播", "香港波牛、新加坡 TronBull、深圳数字艺术展等品牌项目视觉设计"],
          ["体验统一", "优化产品界面与品牌一致性，提升产品体验与传播效率"]
        ]
      },
      {
        title: "XT 交易所｜UI设计师",
        tag: "2018.11 – 2020.07",
        summary: "负责交易平台运营活动、品牌升级及设计规范建设，支持平台业务增长。",
        visual: "linear-gradient(135deg, rgba(167,139,250,.92), rgba(10,12,14,.92) 50%, rgba(96,165,250,.72))",
        gallery: [
          { title: "详情图 1", src: "assets/xt-detail/01-slide-16-9-1.webp", kind: "image", hero: true },
          { title: "详情图 2", src: "assets/xt-detail/02-slide-16-9-2.webp", kind: "image" },
          { title: "详情图 3", src: "assets/xt-detail/03-slide-16-9-3.webp", kind: "image" }
        ],
        facts: [
          ["平台运营", "Web、APP 多端运营活动设计，包括欧洲杯挑战赛、募捐活动、平台币、扭蛋等"],
          ["品牌升级", "参与平台品牌视觉升级，优化品牌调性及运营视觉"],
          ["设计规范", "建立插画体系及设计模板，统一活动页面规范"],
          ["业务增长", "根据运营目标制定活动视觉方案，提高传播效率及品牌曝光"]
        ]
      }
    ];

    const params = new URLSearchParams(window.location.search);
    const requestedIndex = Number.parseInt(params.get("project") || "0", 10);
    const project = projects[Number.isFinite(requestedIndex) ? Math.min(Math.max(requestedIndex, 0), projects.length - 1) : 0] || projects[0];

    document.title = `${project.title} | 工作经历详情`;

    const detailTag = document.getElementById("detailTag");
    const detailDate = document.getElementById("detailDate");
    const detailTitle = document.getElementById("detailTitle");
    const detailSummary = document.getElementById("detailSummary");
    const detailFacts = document.getElementById("detailFacts");
    const detailGallery = document.getElementById("detailGallery");

    detailTag.textContent = "工作经历";
    detailDate.textContent = project.tag;
    detailTitle.textContent = project.title;
    detailSummary.textContent = project.summary;
    const mediaItems = project.gallery?.length
      ? project.gallery
      : project.videoSrc
        ? [{ title: "视觉展示", src: project.videoSrc, poster: project.imageSrc || "", kind: "video", hero: true }]
        : project.imageSrc
          ? [{ title: "视觉展示", src: project.imageSrc, kind: "image", hero: true }]
          : [];

    detailGallery.innerHTML = mediaItems.map((media, index) => `
      <figure class="media-card ${media.hero ? "media-card--hero" : ""}">
        <div class="media-frame" style="--image-bg:${project.visual}">
          ${media.kind === "video"
            ? `<video poster="${media.poster || "assets/coinw-eye.webp"}" autoplay muted playsinline loop preload="metadata" data-lazy-video><source data-src="${media.src}" type="video/mp4"></video>`
            : `<img src="${media.src}" alt="${project.title} - ${media.title}" loading="${index === 0 ? "eager" : "lazy"}" decoding="async">`}
        </div>
      </figure>
    `).join("");
    detailFacts.innerHTML = project.facts.map(([label, value]) => `
      <div class="fact-card">
        <strong>${label}</strong>
        <span>${value}</span>
      </div>
    `).join("");

    function playVideoSafely(video) {
      video.muted = true;
      video.defaultMuted = true;
      video.setAttribute("muted", "");
      video.setAttribute("playsinline", "");
      video.setAttribute("webkit-playsinline", "");
      const playAttempt = video.play();
      if (playAttempt && typeof playAttempt.catch === "function") {
        playAttempt.catch(() => {
          video.controls = true;
        });
      }
    }

    function loadVideo(video) {
      video.querySelectorAll("source[data-src]").forEach((source) => {
        source.src = source.dataset.src;
        source.removeAttribute("data-src");
      });
      video.load();
      playVideoSafely(video);
    }

    const lazyVideoObserver = "IntersectionObserver" in window
      ? new IntersectionObserver((entries, observer) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) return;
            loadVideo(entry.target);
            observer.unobserve(entry.target);
          });
        }, { rootMargin: "0px", threshold: 0.01 })
      : null;

    document.querySelectorAll("video[data-lazy-video]").forEach((video) => {
      if (lazyVideoObserver) {
        lazyVideoObserver.observe(video);
      } else {
        loadVideo(video);
      }
    });
  </script>
</body>
</html>
